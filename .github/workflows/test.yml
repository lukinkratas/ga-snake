name: Test

on:
  push:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # not needed, but theoretically faster due to GH caching of python versions
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Format
        run: make fmt

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typechk
